// Shuffle helper
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Pick 40 random questions and shuffle their answers
function buildExam() {
  const picked = shuffle(certExamBank).slice(0, 40);
  return picked.map(q => {
    const indexed = q.options.map((opt, i) => ({ opt, correct: i === q.answer }));
    const shuffled = shuffle(indexed);
    return {
      ...q,
      options: shuffled.map(x => x.opt),
      answer: shuffled.findIndex(x => x.correct),
    };
  });
}

    ctx.font = "11px Arial";
    ctx.fillText("pokertda.com", 300, 330);

    const rows = results.map(r => {
      const wrong = (r.wrongQuestions || []).join(" | ");
      return [
        r.name || "",
        r.phone || "",
        r.email || "",
        r.pct || "",
        r.score || "",

        r.date || "",
        wrong,
      ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(",");
    });
    const csv = BOM + headers.map(h=>`"${h}"`).join(",") + "\n" + rows.join("\n");

    setTimeout(() => chatEndRef.current?.scrollIntoView({ behavior:"smooth" }), 100);
    try {
      const messages = newHistory.map(m => ({ role: m.role, content: m.content }));
      const payload = JSON.stringify({
        model: "claude-sonnet-4-5",
        max_tokens: 1000,
        system: TDA_SYSTEM_PROMPT,
        messages,
      });

      const reply = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", "https://tdaproxy.yairmoree.workers.dev/", true);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.timeout = 30000;
        xhr.onload = () => {
          try {
            const data = JSON.parse(xhr.responseText);
            if (xhr.status >= 200 && xhr.status < 300) {
              resolve(data?.content?.[0]?.text || "לא הצלחתי לעבד.");
            } else {
              resolve("שגיאה " + xhr.status + ": " + (data?.error?.message || xhr.responseText.substring(0,150)));
            }
          } catch(e) {
            resolve("שגיאה בפענוח תגובה: " + xhr.responseText.substring(0,150));
          }
        };
        xhr.onerror = () => reject(new Error("Network error"));
        xhr.ontimeout = () => reject(new Error("Timeout"));
        xhr.send(payload);
      });

      setChatHistory([...newHistory, { role:"assistant", content: reply }]);
    } catch(err) {
      setChatHistory([...newHistory, { role:"assistant", content:"שגיאת חיבור: " + err.message }]);

              <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", fontSize:18, opacity:0.5 }}>🔍</span>
            </div>
            {searchQuery.trim().length > 1 && searchResults.length === 0 && (
              <div style={{ textAlign:"center", color:T.text2, fontSize:14, padding:"30px 0" }}>לא נמצאו תוצאות לחיפוש "{searchQuery}"</div>
            )}
            {searchResults.map(r => (
              <button key={`${r.chapterId}-${r.number}`}
                onClick={() => { setActiveChapter(r.chapterId); setActiveRule(r.number); setMode("learn"); }}
                style={{ ...S.card(r.chapterColor), marginBottom:8 }}>
                <div style={S.badge(r.chapterColor)}>{r.number}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, fontSize:14, color:r.chapterColor }}>{r.title}</div>
                  <div style={{ fontSize:11, color:"#6a6a70", marginTop:2 }}>{r.chapterTitle}</div>
                  <div style={{ fontSize:12, color:"#9a9090", marginTop:3 }}>{r.summary}</div>
                </div>
                <span style={{ color:r.chapterColor }}>←</span>
              </button>
            ))}
            {searchQuery.trim().length <= 1 && (
              <div style={{ textAlign:"center", color:"#6a6060", fontSize:13, padding:"20px 0" }}>
                <div style={{ fontSize:36, marginBottom:10 }}>🔍</div>
                הקלד לפחות 2 תווים לחיפוש
              </div>
            )}
          </div>
        )}

        {/* SCENARIO / AI */}
        {mode==="scenario" && (
          <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 160px)" }}>
            {!aiUnlocked ? (
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", flex:1, gap:16 }}>
                <div style={{ fontSize:36 }}>🔒</div>
                <div style={{ fontSize:16, fontWeight:800, color:COLORS.scenario }}>שאל AI – פסיקת TDA</div>
                <div style={{ fontSize:13, color:T.text2 }}>הזן סיסמא להמשך</div>
                <input
                  type="password"
                  placeholder="סיסמא..."
                  value={aiPassword}
                  onChange={e => setAiPassword(e.target.value)}
                  onKeyDown={e => { if(e.key==="Enter"){ if(aiPassword==="MichalTM"){ setAiUnlocked(true); setAiPassword(""); } else { setAiPassword(""); } } }}
                  style={{ padding:"10px 14px", borderRadius:10, border:`1px solid ${COLORS.scenario}50`, background:T.bgCard, color:T.text, fontSize:15, textAlign:"center", width:200, outline:"none", fontFamily:"inherit" }}
                  autoFocus
                />
                <button
                  onClick={() => { if(aiPassword==="MichalTM"){ setAiUnlocked(true); setAiPassword(""); } else { setAiPassword(""); } }}
                  style={{ padding:"10px 28px", borderRadius:10, border:"none", background:COLORS.scenario, color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer" }}>
                  כניסה
                </button>
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", flex:1, overflow:"hidden" }}>
                <div style={{ fontSize:16, fontWeight:800, color:COLORS.scenario, marginBottom:5 }}>🤖 שאל AI – פסיקת TDA</div>
                <div style={{ fontSize:13, color:T.text2, marginBottom:13, lineHeight:1.6 }}>תאר תרחיש מהשולחן ותקבל פסיקה לפי חוקי TDA 2024</div>

            {/* chat */}
            <div style={{ flex:1, overflowY:"auto", marginBottom:12, display:"flex", flexDirection:"column", gap:10 }}>
              {chatHistory.length === 0 && (
                <div style={{ textAlign:"center", padding:"30px 20px" }}>
                  <div style={{ fontSize:40, marginBottom:12 }}>🃏</div>
                  <div style={{ fontSize:14, color:T.text2, lineHeight:1.7 }}>
                    לדוגמה:<br/>
                    <span style={{ color:COLORS.scenario }}>"בליינדים 500/1,000. A הימר 3,000. B דחף צ'יפ של 5,000 בשקט. מה הפסיקה?"</span>
                  </div>
                </div>
              )}
              {chatHistory.map((msg, i) => (
                <div key={i} style={{ display:"flex", justifyContent: msg.role==="user"?"flex-start":"flex-end" }}>
                  <div style={{
                    maxWidth:"85%",
                    padding:"11px 14px",
                    borderRadius: msg.role==="user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
                    background: msg.role==="user" ? "rgba(200,169,110,0.2)" : (dark?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.85)"),
                    border: msg.role==="user" ? "1px solid rgba(200,169,110,0.4)" : (dark?"1px solid rgba(255,255,255,0.12)":"1px solid rgba(0,0,0,0.1)"),
                    fontSize:13,
                    lineHeight:1.7,
                    whiteSpace:"pre-wrap",
                    color: msg.role==="user" ? (dark?"#e8c87a":"#5a3c00") : (dark?"#e8e4dc":"#1a1410"),
                    textAlign:"right",
                  }}>
                    {msg.content}
                  </div>
                </div>
              ))}
              {scenarioLoading && (
                <div style={{ display:"flex", justifyContent:"flex-end" }}>
                  <div style={{ padding:"11px 16px", borderRadius:"14px 14px 14px 4px", background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", fontSize:13, color:"#5a5050" }}>
                    ⏳ מנתח לפי חוקי TDA…
                  </div>
                </div>
              )}
              <div ref={chatEndRef} />
            </div>

            {/* input */}
            <div style={{ display:"flex", gap:8, alignItems:"flex-end" }}>
              <textarea
                value={scenario}
                onChange={e => setScenario(e.target.value)}
                onKeyDown={e => { if(e.key==="Enter" && !e.shiftKey) { e.preventDefault(); askScenario(); } }}
                placeholder="תאר את התרחיש..."
                rows={2}
                style={{ flex:1, padding:"11px 14px", borderRadius:12, border:"1px solid rgba(224,160,80,0.4)", background:T.bgCard, color:T.text, fontSize:13, outline:"none", resize:"none", direction:"rtl", fontFamily:"inherit" }}
              />
              <button onClick={askScenario} disabled={!scenario.trim() || scenarioLoading}
                style={{ padding:"11px 16px", borderRadius:12, border:"none", background: scenario.trim() && !scenarioLoading ? COLORS.scenario : "rgba(255,255,255,0.1)", color: scenario.trim() && !scenarioLoading ? "#0f0c1a":"#5a5050", fontWeight:800, fontSize:18, cursor: scenario.trim() && !scenarioLoading ?"pointer":"default", flexShrink:0 }}>
                ←
              </button>
            </div>
            {chatHistory.length > 0 && (
              <button onClick={() => setChatHistory([])} style={{ marginTop:8, background:"none", border:"none", color:"#5a5050", fontSize:12, cursor:"pointer", textAlign:"center" }}>
                🗑️ נקה שיחה
              </button>
            )}
              </div>
            )}
          </div>
        )}

        {/* PRACTICE */}
        {mode==="practice" && !pqDone && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:13 }}>
              <div style={{ fontSize:12, color:T.text2 }}>שאלה {pqIdx+1} / {practiceQuiz.length}</div>
              <div style={{ fontSize:12, fontWeight:700, color:"#8b7cb8", background:"rgba(139,124,184,0.15)", padding:"3px 10px", borderRadius:20 }}>✅ {pqScore}</div>
            </div>
            <div style={{ height:3, background:"rgba(255,255,255,0.1)", borderRadius:2, marginBottom:16 }}>
              <div style={{ height:"100%", borderRadius:2, background:"#8b7cb8", width:`${(pqIdx/practiceQuiz.length)*100}%`, transition:"width 0.3s" }} />
            </div>
            <div style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:14, padding:"15px", fontSize:15, fontWeight:700, lineHeight:1.6, marginBottom:15 }}>{practiceQuiz[pqIdx].q}</div>
            <div>{practiceQuiz[pqIdx].options.map((opt,i) => {
              const state = pqSel===null?"idle": i===practiceQuiz[pqIdx].answer?"correct": i===pqSel?"wrong":"idle";
              return <button key={i} onClick={() => handlePQAnswer(i)} style={S.optBtn(state)}>{opt}</button>;
            })}</div>
            {pqSel!==null && (
              <div>
                <div style={{ background:pqSel===practiceQuiz[pqIdx].answer?"rgba(100,200,100,0.12)":"rgba(200,100,100,0.12)", border:`1px solid ${pqSel===practiceQuiz[pqIdx].answer?"rgba(100,200,100,0.4)":"rgba(200,100,100,0.4)"}`, borderRadius:11, padding:"11px 13px", fontSize:15, lineHeight:1.7, marginBottom:11, color:pqSel===practiceQuiz[pqIdx].answer?"#1a6030":"#8a1010" }}>
                  {pqSel===practiceQuiz[pqIdx].answer?"✅ ":"❌ "}{practiceQuiz[pqIdx].exp}
                </div>
                <button onClick={nextPQ} style={{ width:"100%", padding:"12px", borderRadius:11, border:"none", background:"#8b7cb8", color:"#fff", fontWeight:800, fontSize:14, cursor:"pointer" }}>
                  {pqIdx+1<practiceQuiz.length?"שאלה הבאה ←":"ראה תוצאות 🏆"}
                </button>
              </div>
            )}
          </div>
        )}
        {mode==="practice" && pqDone && (
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:50, marginBottom:11 }}>{pqScore>=13?"🏆":pqScore>=10?"🥈":"📚"}</div>
            <div style={{ fontSize:22, fontWeight:900, color:"#8b7cb8", marginBottom:5 }}>{pqScore}/{practiceQuiz.length}</div>
            <div style={{ fontSize:14, color:T.text2, marginBottom:20 }}>{pqScore===practiceQuiz.length?"מושלם!":pqScore>=11?"כמעט שם!":pqScore>=8?"טוב, כדאי לחזור":"המשך ללמוד!"}</div>
            <div style={{ display:"grid", gap:8 }}>
              <button onClick={resetPQ} style={{ padding:"12px", borderRadius:11, border:"none", background:"#8b7cb8", color:"#fff", fontWeight:800, fontSize:14, cursor:"pointer" }}>🔄 נסה שוב</button>
              <button onClick={() => { goMode("exam"); resetCE(); }} style={{ padding:"12px", borderRadius:11, border:"1px solid rgba(224,123,106,0.5)", background:"transparent", color:"#e07b6a", fontWeight:700, fontSize:13, cursor:"pointer" }}>🏆 מבחן הסמכה</button>
              <button onClick={() => goMode("learn")} style={{ padding:"12px", borderRadius:11, border:"1px solid rgba(200,169,110,0.4)", background:"transparent", color:"#c8a96e", fontWeight:700, fontSize:13, cursor:"pointer" }}>📖 חזור ללימוד</button>
            </div>
          </div>
        )}

        {/* EXAM */}
        {mode==="exam" && !ceDone && !examStarted && (
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:44, marginBottom:10 }}>🏆</div>
            <div style={{ fontSize:20, fontWeight:900, color:"#e07b6a", marginBottom:4 }}>מבחן הסמכה TDA</div>
            <div style={{ fontSize:13, color:T.text2, marginBottom:20 }}>40 שאלות אקראיות • נדרש 90% לעבור</div>
            <div style={{ background:T.bgCard, border:`1px solid rgba(224,123,106,0.3)`, borderRadius:14, padding:"18px", marginBottom:16, textAlign:"right" }}>
              <div style={{ fontSize:14, fontWeight:700, color:"#e07b6a", marginBottom:14 }}>📋 פרטי הנבחן</div>
              <div style={{ marginBottom:10 }}>
                <div style={{ fontSize:12, color:T.text2, marginBottom:5 }}>שם מלא *</div>
                <input type="text" value={examRegName} onChange={e=>setExamRegName(e.target.value)}
                  placeholder="ישראל ישראלי"
                  style={{ width:"100%", padding:"10px 12px", borderRadius:9, border:`1px solid ${examRegError&&!examRegName.trim()?"#e07b6a":T.border}`, background:T.bg, color:T.text, fontSize:14, outline:"none", fontFamily:"inherit", boxSizing:"border-box", textAlign:"right" }} />
              </div>
              <div style={{ marginBottom:10 }}>
                <div style={{ fontSize:12, color:T.text2, marginBottom:5 }}>טלפון *</div>
                <input type="tel" value={examRegPhone} onChange={e=>setExamRegPhone(e.target.value)}
                  placeholder="050-0000000"
                  style={{ width:"100%", padding:"10px 12px", borderRadius:9, border:`1px solid ${examRegError&&!examRegPhone.trim()?"#e07b6a":T.border}`, background:T.bg, color:T.text, fontSize:14, outline:"none", fontFamily:"inherit", boxSizing:"border-box", textAlign:"right" }} />
              </div>
              <div style={{ marginBottom:4 }}>
                <div style={{ fontSize:12, color:T.text2, marginBottom:5 }}>אימייל *</div>
                <input type="email" value={examRegEmail} onChange={e=>setExamRegEmail(e.target.value)}
                  placeholder="israel@example.com"
                  style={{ width:"100%", padding:"10px 12px", borderRadius:9, border:`1px solid ${examRegError&&!examRegEmail.trim()?"#e07b6a":T.border}`, background:T.bg, color:T.text, fontSize:14, outline:"none", fontFamily:"inherit", boxSizing:"border-box", textAlign:"left" }} />
              </div>
              {examRegError && <div style={{ fontSize:12, color:"#e07b6a", marginTop:8 }}>{examRegError}</div>}
            </div>
            <button onClick={() => {
              if(!examRegName.trim()||!examRegPhone.trim()||!examRegEmail.trim()){
                setExamRegError("יש למלא את כל השדות"); return;
              }
              if(!/\S+@\S+\.\S+/.test(examRegEmail)){
                setExamRegError("כתובת אימייל לא תקינה"); return;
              }
              setExamRegError("");
              setExamName(examRegName.trim());
              setExamStarted(true);
            }} style={{ width:"100%", padding:"14px", borderRadius:11, border:"none", background:"#e07b6a", color:"#fff", fontWeight:800, fontSize:16, cursor:"pointer", marginBottom:10 }}>
              התחל מבחן ←
            </button>
            <div style={{ fontSize:11, color:T.textMuted }}>הפרטים נשמרים מקומית בלבד</div>
          </div>
        )}
        {mode==="exam" && !ceDone && examStarted && (
          <div>
            <div style={{ background:"rgba(224,123,106,0.1)", border:"1px solid rgba(224,123,106,0.3)", borderRadius:11, padding:"9px 13px", marginBottom:13, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ fontSize:12, color:"#e07b6a", fontWeight:700 }}>🏆 {examRegName}</div>
              <div style={{ fontSize:11, color:"#7a6050" }}>נדרש 90%</div>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <div style={{ fontSize:12, color:T.text2 }}>שאלה {ceIdx+1} / {certExam.length}</div>
              <div style={{ fontSize:11, color:T.textMuted, background:"rgba(224,123,106,0.12)", padding:"3px 9px", borderRadius:20 }}>{certExam[ceIdx].rule}</div>
            </div>
            <div style={{ height:3, background:"rgba(255,255,255,0.1)", borderRadius:2, marginBottom:15 }}>
              <div style={{ height:"100%", borderRadius:2, background:"#e07b6a", width:`${(ceIdx/certExam.length)*100}%`, transition:"width 0.3s" }} />
            </div>
            <div style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:13, padding:"14px", fontSize:14, fontWeight:700, lineHeight:1.6, marginBottom:13 }}>{certExam[ceIdx].q}</div>
            <div>{certExam[ceIdx].options.map((opt,i) => {
              const state = ceSel===null?"idle": i===certExam[ceIdx].answer?"correct": i===ceSel?"wrong":"idle";
              return <button key={i} onClick={() => handleCEAnswer(i)} style={S.optBtn(state)}>{opt}</button>;
            })}</div>
            {ceSel!==null && (
              <button onClick={nextCE} style={{ width:"100%", marginTop:5, padding:"12px", borderRadius:11, border:"none", background:"#e07b6a", color:"#fff", fontWeight:800, fontSize:14, cursor:"pointer" }}>
                {ceIdx+1<certExam.length?"שאלה הבאה ←":"סיים מבחן 🏁"}
              </button>
            )}
          </div>
        )}
        {mode==="exam" && ceDone && !ceReview && (() => {
          const savedResult = examResults[0] && examResults[0].score === ceScore ? examResults[0] : null;
          return (
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:50, marginBottom:11 }}>{passed?"🏆":"📚"}</div>
            <div style={{ fontSize:24, fontWeight:900, color:passed?"#c8a96e":"#e07b6a", marginBottom:5 }}>{ceScore}/40 • {cePct}%</div>
            <div style={{ fontSize:15, color:passed?"#8de8a0":"#e89090", fontWeight:700, marginBottom:5 }}>{passed?"✅ עברת! מוסמך TDA":"❌ לא עברת – נדרש 90%"}</div>
            <div style={{ fontSize:13, color:T.text2, marginBottom:16 }}>{passed?"ניתן להגיש ב-pokertda.com":"חזור על הנושאים שטעית ונסה שוב."}</div>

            <button onClick={() => shareResult(examResults[0])}
              style={{ width:"100%", padding:"11px", borderRadius:11, border:"none", background:"#25D366", color:"#fff", fontWeight:800, fontSize:14, cursor:"pointer", marginBottom:10, display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
              📤 שתף בוואטסאפ
            </button>

            <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:13, padding:"13px", marginBottom:15, textAlign:"right" }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#c8a96e", marginBottom:9 }}>ניתוח תוצאות</div>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}><span style={{ fontSize:13, color:"#8de8a0" }}>✅ נכונות</span><span style={{ fontSize:13, fontWeight:700, color:"#8de8a0" }}>{ceScore}</span></div>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}><span style={{ fontSize:13, color:"#e88080" }}>❌ שגויות</span><span style={{ fontSize:13, fontWeight:700, color:"#e88080" }}>{40-ceScore}</span></div>
              <div style={{ display:"flex", justifyContent:"space-between" }}><span style={{ fontSize:13, color:"#c8a96e" }}>📊 ציון</span><span style={{ fontSize:13, fontWeight:700, color:passed?"#8de8a0":"#e88080" }}>{cePct}% {passed?"✅":"❌"}</span></div>
            </div>

            {examResults.length > 0 && (
              <div style={{ background:"rgba(255,255,255,0.03)", border:`1px solid ${T.border}`, borderRadius:13, padding:"13px", marginBottom:15, textAlign:"right" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:9 }}>
                  <button onClick={exportToExcel} style={{ fontSize:11, padding:"4px 10px", borderRadius:7, border:"1px solid rgba(100,200,100,0.4)", background:"rgba(100,200,100,0.1)", color:"#6dc86d", cursor:"pointer", fontWeight:700 }}>
                    📊 ייצוא לאקסל
                  </button>
                  <div style={{ fontSize:13, fontWeight:700, color:"#c8a96e" }}>📋 היסטוריה ({examResults.length})</div>
                </div>
                {examResults.slice(0,8).map((r,i) => (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom: i<Math.min(examResults.length,8)-1 ? `1px solid ${T.border}` : "none" }}>
                    <div>
                      <div style={{ fontSize:12, color:T.text, fontWeight:600 }}>{r.name}</div>
                      <div style={{ fontSize:11, color:T.textMuted }}>{r.date} • {r.email||r.phone||""}</div>
                    </div>
                    <span style={{ fontSize:13, fontWeight:700, color: r.passed?"#8de8a0":"#e88080" }}>{r.pct}% {r.passed?"✅":"❌"}</span>
                  </div>
                ))}
              </div>
            )}

            <div style={{ display:"grid", gap:8 }}>
              <button onClick={() => setCeReview(true)} style={{ padding:"12px", borderRadius:11, border:"1px solid rgba(91,155,213,0.5)", background:"rgba(91,155,213,0.1)", color:"#5b9bd5", fontWeight:700, fontSize:13, cursor:"pointer" }}>🔍 בדוק תשובות</button>
              <button onClick={resetCE} style={{ padding:"12px", borderRadius:11, border:"none", background:"#e07b6a", color:"#fff", fontWeight:800, fontSize:14, cursor:"pointer" }}>🔄 נסה שוב</button>
              <button onClick={() => goMode("learn")} style={{ padding:"12px", borderRadius:11, border:"1px solid rgba(200,169,110,0.4)", background:"transparent", color:"#c8a96e", fontWeight:700, fontSize:13, cursor:"pointer" }}>📖 חזור ללימוד</button>
            </div>
          </div>
          );
        })()}
        {mode==="exam" && ceDone && ceReview && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:13 }}>
              <button onClick={() => setCeReview(false)} style={S.back("#5b9bd5")}>→ חזרה לתוצאות</button>
              <div style={{ fontSize:12, color:passed?"#8de8a0":"#e88080", fontWeight:700 }}>{ceScore}/40 • {cePct}%</div>
            </div>
            {certExam.map((q,i) => {
              const ans = ceAnswers[i];
              if(!ans) return null;
              return (
                <div key={i} style={{ background:ans.correct?"rgba(100,200,100,0.07)":"rgba(200,80,80,0.07)", border:`1px solid ${ans.correct?"rgba(100,200,100,0.22)":"rgba(200,80,80,0.22)"}`, borderRadius:11, padding:"10px 13px", marginBottom:7 }}>
                  <div style={{ display:"flex", gap:7, alignItems:"flex-start", marginBottom:ans.correct?0:6 }}>
                    <span style={{ fontSize:13, marginTop:1 }}>{ans.correct?"✅":"❌"}</span>
                    <div style={{ fontSize:13, fontWeight:600, lineHeight:1.5, color:T.text }}>{q.q}</div>
                  </div>
                  {!ans.correct && <div style={{ fontSize:12, color:"#5b9bd5", paddingRight:20 }}>תשובה נכונה: <strong>{q.options[q.answer]}</strong> <span style={{ color:T.textMuted }}>({q.rule})</span></div>}
                </div>
              );
            })}
            <button onClick={() => setCeReview(false)} style={{ width:"100%", marginTop:8, padding:"12px", borderRadius:11, border:"none", background:"#e07b6a", color:"#fff", fontWeight:700, fontSize:13, cursor:"pointer" }}>← חזרה לתוצאות</button>
          </div>
        )}

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
